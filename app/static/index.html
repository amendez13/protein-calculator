<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Protein Calculator</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__title">
          <h1>Protein Tracker</h1>
        </div>

        <nav class="tabs" aria-label="Main navigation">
          <button class="tab is-active" type="button" data-tab="today">Today</button>
          <button class="tab" type="button" data-tab="simulation">Simulation</button>
          <button class="tab" type="button" data-tab="history">History</button>
          <button class="tab" type="button" data-tab="settings">Settings</button>
        </nav>
      </header>

      <main class="main">
        <section class="progress-section" aria-label="Daily progress">
          <div class="wheel-container" aria-hidden="true">
            <svg class="progress-wheel" viewBox="0 0 120 120">
              <circle class="bg" cx="60" cy="60" r="50" />
              <circle class="progress" cx="60" cy="60" r="50" />
            </svg>
            <div class="wheel-center">
              <div class="wheel-center__current" id="current-protein">0g</div>
              <div class="wheel-center__label">Today</div>
            </div>
          </div>

          <div class="stats" aria-label="Current and goal">
            <span class="stats__current" id="stats-current">0</span>g
            <span class="stats__sep">/</span>
            <span class="stats__goal" id="stats-goal">150</span>g
          </div>
        </section>

        <section class="content" aria-label="Views">
          <section id="view-today" class="view" data-view="today">
            <div class="date-navigation">
              <button id="date-prev" class="date-nav-btn" type="button" aria-label="Previous day">&lt;</button>
              <span id="date-display" class="date-display" role="button" tabindex="0">Today</span>
              <button id="date-next" class="date-nav-btn" type="button" aria-label="Next day">&gt;</button>
              <input type="date" id="date-picker" class="date-picker-hidden" aria-hidden="true" />
            </div>

            <section class="log-section" aria-label="Log protein intake">
              <h3 class="section-title">Log Protein</h3>
              <form id="log-form" class="log-form">
                <div class="form-group">
                  <label class="label" for="food-search">Food</label>
                  <input
                    type="text"
                    id="food-search"
                    placeholder="Search foods..."
                    autocomplete="off"
                    inputmode="search"
                  />
                  <input type="hidden" id="selected-food-id" />
                  <div id="food-dropdown" class="dropdown" role="listbox" aria-label="Food results" hidden></div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label class="label" for="quantity">Amount</label>
                    <input type="number" id="quantity" placeholder="0" step="0.1" min="0" />
                  </div>

                  <div class="form-group">
                    <label class="label" for="quantity-type">Unit</label>
                    <select id="quantity-type">
                      <option value="grams">grams</option>
                      <option value="servings">servings</option>
                    </select>
                  </div>
                </div>

                <button type="submit" class="button button--primary">Log</button>
                <div id="log-message" class="message" role="status" aria-live="polite"></div>
              </form>
            </section>

            <section class="entries-section" aria-label="Today's log">
              <h3 class="section-title">Today's Log</h3>
              <div id="entries-list" class="entries-list"></div>
              <div class="entries-total">
                Total: <span id="total-protein">0</span>g
              </div>
            </section>
          </section>

          <section id="view-simulation" class="view" data-view="simulation" hidden>
            <h2 class="view__title">Simulation</h2>

            <section class="simulation-section" aria-label="Simulation summary">
              <div class="simulation-grid">
                <div class="wheel-container wheel-container--sim" aria-hidden="true">
                  <svg class="progress-wheel progress-wheel--sim" viewBox="0 0 120 120">
                    <circle class="bg" cx="60" cy="60" r="50" />
                    <circle class="progress progress--planned" cx="60" cy="60" r="50" />
                    <circle class="progress progress--actual" cx="60" cy="60" r="50" />
                  </svg>
                  <div class="wheel-center">
                    <div class="wheel-center__current" id="sim-combined">0g</div>
                    <div class="wheel-center__label">Combined</div>
                  </div>
                </div>

                <div class="simulation-stats" aria-label="Actual, planned, combined">
                  <div class="sim-stat">
                    <span class="sim-stat__label">Actual</span>
                    <span class="sim-stat__value"><span id="sim-actual">0</span>g</span>
                  </div>
                  <div class="sim-stat">
                    <span class="sim-stat__label">Planned</span>
                    <span class="sim-stat__value"><span id="sim-planned">0</span>g</span>
                  </div>
                  <div class="sim-stat">
                    <span class="sim-stat__label">Goal</span>
                    <span class="sim-stat__value"><span id="sim-goal">150</span>g</span>
                  </div>
                </div>
              </div>

              <div class="simulation-log">
                <h3 class="section-title">Plan Additional Items</h3>
                <form id="simulation-form" class="log-form">
                  <div class="form-group">
                    <label class="label" for="sim-food-search">Food</label>
                    <input
                      type="text"
                      id="sim-food-search"
                      placeholder="Search foods..."
                      autocomplete="off"
                      inputmode="search"
                    />
                    <input type="hidden" id="sim-selected-food-id" />
                    <div id="sim-food-dropdown" class="dropdown" role="listbox" aria-label="Food results" hidden></div>
                  </div>

                  <div class="form-row">
                    <div class="form-group">
                      <label class="label" for="sim-quantity">Amount</label>
                      <input type="number" id="sim-quantity" placeholder="0" step="0.1" min="0" />
                    </div>

                    <div class="form-group">
                      <label class="label" for="sim-quantity-type">Unit</label>
                      <select id="sim-quantity-type">
                        <option value="grams">grams</option>
                        <option value="servings">servings</option>
                      </select>
                    </div>
                  </div>

                  <button type="submit" class="button button--primary">Add Planned</button>
                  <div id="sim-message" class="message" role="status" aria-live="polite"></div>
                </form>
              </div>

              <div class="simulation-entries">
                <h3 class="section-title">Planned Items</h3>
                <div id="simulation-entries" class="entries-list"></div>
                <button id="clear-simulation" class="button button--danger" type="button">Clear All Planned</button>
              </div>
            </section>
          </section>

          <section id="view-history" class="view" data-view="history" hidden>
            <h2 class="view__title">History</h2>
            <div id="history-list" class="history-list"></div>
          </section>

          <section id="view-settings" class="view" data-view="settings" hidden>
            <h2 class="view__title">Settings</h2>

            <section class="setting-group" aria-label="Daily protein goal">
              <h3 class="section-title">Daily Protein Goal (grams)</h3>
              <div class="form-row">
                <div class="form-group">
                  <label class="label" for="goal-input">Goal</label>
                  <input type="number" id="goal-input" min="1" max="500" step="1" />
                </div>
                <div class="form-group">
                  <label class="label" for="save-goal">&nbsp;</label>
                  <button id="save-goal" class="button button--primary" type="button">Save</button>
                </div>
              </div>
              <div id="settings-message" class="message" role="status" aria-live="polite"></div>
            </section>

            <section class="setting-group" aria-label="Food database">
              <h3 class="section-title">Food Database</h3>
              <div class="form-group">
                <label class="label" for="foods-search">Search</label>
                <input type="text" id="foods-search" placeholder="Search foods..." autocomplete="off" />
              </div>

              <div id="foods-list" class="foods-list"></div>

              <details class="add-food">
                <summary class="button">Add New Food</summary>
                <form id="add-food-form" class="log-form">
                  <div class="form-row">
                    <div class="form-group">
                      <label class="label" for="add-food-name">Name</label>
                      <input type="text" id="add-food-name" placeholder="e.g. Lentils" />
                    </div>
                    <div class="form-group">
                      <label class="label" for="add-food-protein">Protein / 100g</label>
                      <input type="number" id="add-food-protein" placeholder="0" step="0.1" min="0" />
                    </div>
                  </div>

                  <div class="form-row">
                    <div class="form-group">
                      <label class="label" for="add-food-category">Category (optional)</label>
                      <input type="text" id="add-food-category" placeholder="e.g. plant" />
                    </div>
                    <div class="form-group">
                      <label class="label" for="add-food-serving-grams">Serving grams (optional)</label>
                      <input type="number" id="add-food-serving-grams" placeholder="0" step="0.1" min="0" />
                    </div>
                  </div>

                  <div class="form-group">
                    <label class="label" for="add-food-serving-name">Serving name (optional)</label>
                    <input type="text" id="add-food-serving-name" placeholder="e.g. cup" />
                  </div>

                  <button type="submit" class="button button--primary">Create Food</button>
                  <div id="add-food-message" class="message" role="status" aria-live="polite"></div>
                </form>
              </details>
            </section>
          </section>
        </section>
      </main>
    </div>

    <div id="edit-modal" class="modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__content">
        <div class="modal__header">
          <h3 class="modal__title">Edit Entry</h3>
          <button id="edit-modal-close" class="modal__close" type="button" aria-label="Close">&times;</button>
        </div>
        <form id="edit-form" class="log-form">
          <div class="form-group">
            <label class="label" for="edit-food-search">Food</label>
            <input
              type="text"
              id="edit-food-search"
              placeholder="Search foods..."
              autocomplete="off"
              inputmode="search"
            />
            <input type="hidden" id="edit-selected-food-id" />
            <div id="edit-food-dropdown" class="dropdown" role="listbox" aria-label="Food results" hidden></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="label" for="edit-quantity">Amount</label>
              <input type="number" id="edit-quantity" placeholder="0" step="0.1" min="0" />
            </div>

            <div class="form-group">
              <label class="label" for="edit-quantity-type">Unit</label>
              <select id="edit-quantity-type">
                <option value="grams">grams</option>
                <option value="servings">servings</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="label" for="edit-date">Date</label>
            <input type="date" id="edit-date" />
          </div>

          <div class="modal__actions">
            <button type="button" id="edit-cancel" class="button">Cancel</button>
            <button type="submit" class="button button--primary">Save</button>
          </div>
          <div id="edit-message" class="message" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
